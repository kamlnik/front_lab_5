<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кликер - Vue CDN</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <h2>Кликер</h2>
        <p>Счётчик: {{ counter }}</p>
        <button @click="increment">Кнопка</button>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const counter = ref(0);
                const increment = () => {
                    counter.value++;
                };
                return { counter, increment };
            }
        }).mount('#app');
    </script>
</body>
</html>
